name: Sync China ISP Routes (List + Table) from tcp5

on:
  schedule:
    - cron: '0 2 * * *'    # Daily at ~10:00 Beijing Time
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get current Beijing date
        id: date
        run: |
          echo "date=$(TZ='Asia/Shanghai' date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Create directory structure
        run: |
          mkdir -p list/latest table/latest
          mkdir -p "list/history/${{ steps.date.outputs.date }}" "table/history/${{ steps.date.outputs.date }}"

      - name: Download List format
        run: |
          cd list/latest
          curl -L -o chinatelecom_latest.rsc http://ros.tcp5.com/list/telecom_latest.rsc
          curl -L -o chinaunicom_latest.rsc http://ros.tcp5.com/list/unicom_latest.rsc
          curl -L -o chinamobile_latest.rsc http://ros.tcp5.com/list/mobile_latest.rsc
          curl -L -o cernet_latest.rsc http://ros.tcp5.com/list/cernet_latest.rsc
          curl -L -o other_latest.rsc http://ros.tcp5.com/list/other_latest.rsc
          curl -L -o all_china_latest.rsc http://ros.tcp5.com/list/all_china_latest.rsc

          cd ../history/${{ steps.date.outputs.date }}
          cp ../../latest/*.rsc .

      - name: Download Table format
        run: |
          cd table/latest
          curl -L -o chinatelecom_latest.rsc http://ros.tcp5.com/table/telecom_latest.rsc
          curl -L -o chinaunicom_latest.rsc http://ros.tcp5.com/table/unicom_latest.rsc
          curl -L -o chinamobile_latest.rsc http://ros.tcp5.com/table/mobile_latest.rsc
          curl -L -o cernet_latest.rsc http://ros.tcp5.com/table/cernet_latest.rsc
          curl -L -o other_latest.rsc http://ros.tcp5.com/table/other_latest.rsc
          curl -L -o all_china_latest.rsc http://ros.tcp5.com/table/all_china_latest.rsc

          cd ../history/${{ steps.date.outputs.date }}
          cp ../../latest/*.rsc .

      - name: Commit and push if changes exist
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add list/ table/
          
          if git diff --cached --quiet; then
            echo "No changes detected today, skipping commit."
          else
            git commit -m "Auto sync routes ${{ steps.date.outputs.date }} (List + Table) from tcp5."
            git push
            echo "Changes committed and pushed successfully."
          fi
